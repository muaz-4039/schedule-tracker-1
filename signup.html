<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Tracker | Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
    <main class="auth-shell">
        <section class="brand-panel">
            <p class="eyebrow">Create your account</p>
            <h1>Start organizing your time with less friction.</h1>
            <p class="brand-copy">Build a quick account to save your details and use the tracker from the login page.</p>
        </section>

        <section class="auth-card">
            <p class="card-kicker">First time here?</p>
            <h2>Sign up</h2>
            <p class="card-copy">A few details and you are ready to go.</p>

            <form id="signupForm" class="auth-form">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="First name" required>

                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Last name" required>

                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" required>

                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="At least 8 characters" required>

                <button type="submit">Create Account</button>
            </form>

            <p id="signupMessage" class="status-message" aria-live="polite"></p>
            <p class="switch-text">Already have an account? <button type="button" class="text-button" onclick="goToLogin()">Back to login</button></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
