<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Tracker | Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
    <main class="auth-shell">
        <section class="brand-panel">
            <p class="eyebrow">Schedule Tracker</p>
            <h1>Keep every plan in one calm place.</h1>
            <p class="brand-copy">Sign in to review your schedule, stay on top of tasks, and pick up where you left off.</p>
        </section>

        <section class="auth-card">
            <p class="card-kicker">Welcome back</p>
            <h2>Log in</h2>
            <p class="card-copy">Use your account details to continue.</p>

            <form id="loginForm" class="auth-form">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required>

                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>

            <p id="loginMessage" class="status-message" aria-live="polite"></p>
            <p class="switch-text">New here? <button type="button" class="text-button" onclick="goToSignup()">Create an account</button></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
